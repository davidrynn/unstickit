    <rect x="72" y="1338" width="801" height="142" rx="20" fill="#ffffff"/>
    <text class="option" x="123" y="1424">Something else</text>
    <path d="M820 1399l17 18-17 18" fill="none" stroke="#8e8e93" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
