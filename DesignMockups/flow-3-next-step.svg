<svg width="945" height="1679" viewBox="0 0 945 1679" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbfbfc; }
      .screenTitle { font: 700 40px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #111111; }
      .section { font: 700 28px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #7d828c; }
      .big { font: 700 55px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #111111; }
      .helper { font: 400 30px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #6f7480; }
      .button { font: 700 36px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: white; }
      .action { font: 500 31px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #536891; }
      .time { font: 700 39px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; fill: #050505; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.075"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="945" height="1679" rx="48"/>

  <text class="time" x="116" y="83">6:37</text>
  <rect x="320" y="25" width="306" height="94" rx="47" fill="#000"/>
  <circle cx="695" cy="77" r="4" fill="#c7c7cc"/>
  <circle cx="708" cy="77" r="4" fill="#c7c7cc"/>
  <circle cx="721" cy="77" r="4" fill="#c7c7cc"/>
  <path d="M748 65c22-18 54-18 76 0" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <path d="M760 78c15-11 36-11 51 0" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <rect x="811" y="57" width="52" height="28" rx="8" fill="none" stroke="#111" stroke-width="4"/>
  <rect x="817" y="62" width="40" height="18" rx="5" fill="#111"/>

  <circle cx="88" cy="193" r="42" fill="#ffffff" filter="url(#softShadow)"/>
  <path d="M101 171l-25 25 25 25" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="screenTitle" x="472" y="209" text-anchor="middle">Here's your next step</text>

  <text class="section" x="76" y="430">YOUR NEXT STEP</text>

  <text class="big" x="76" y="526">Write one sentence:</text>
  <text class="big" x="76" y="614">'I keep getting stuck with</text>
  <text class="big" x="76" y="702">AI/SwiftUI compatibility</text>
  <text class="big" x="76" y="790">because...'</text>
  <text class="big" x="76" y="878">Then stop.</text>

  <text class="helper" x="76" y="962">Keep it short. This is only to surface the real</text>
  <text class="helper" x="76" y="1005">friction, not solve the whole app.</text>

  <rect x="70" y="1110" width="805" height="132" rx="24" fill="#0a8cff" filter="url(#softShadow)"/>
