  </g>
  <line x1="192" y1="1430" x2="753" y2="1430" stroke="#d9d9df" stroke-width="1"/>
  <g>
    <path d="M343 1494v68l27-18 27 18v-68z" fill="none" stroke="#536891" stroke-width="4" stroke-linejoin="round"/>
